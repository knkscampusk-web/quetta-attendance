<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>QUETTA 출석부</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--t:#2BADA0;--td:#0D6B64;--g:#D4BE52;--bg:#f4f6f8;--w:#fff;--tx:#1a1a1a;--mu:#6b7280;--br:#e5e7eb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}
#sl{justify-content:center;align-items:center;background:linear-gradient(160deg,var(--td),var(--t));padding:24px}
.lb{background:var(--w);border-radius:20px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.25)}
.ll{text-align:center;margin-bottom:36px}.lt{font-size:22px;font-weight:800;color:var(--td)}.ls{font-size:13px;color:var(--mu);margin-top:4px}
.fi{margin-bottom:14px}.fi label{display:block;font-size:12px;font-weight:700;color:var(--mu);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fi input{width:100%;padding:13px 16px;border:1.5px solid var(--br);border-radius:10px;font-size:16px;outline:none;transition:border-color .2s}
.fi input:focus{border-color:var(--t)}
.blo{width:100%;padding:14px;margin-top:4px;background:var(--t);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.blo:disabled{background:#9ca3af;cursor:not-allowed}
.le{color:#dc2626;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.hd{background:var(--t);color:#fff;padding:13px 18px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.ht{flex:1;min-width:0}.hs{font-size:11px;opacity:.75}.hd h2{font-size:17px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bi{background:none;border:none;color:#fff;cursor:pointer;font-size:18px;padding:4px 5px;border-radius:6px;line-height:1;transition:background .15s;white-space:nowrap}
.bi:hover{background:rgba(255,255,255,.18)}
.tb{display:flex;background:var(--w);border-bottom:1px solid var(--br)}
.tbn{flex:1;padding:10px 4px;border:none;background:none;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;border-bottom:3px solid transparent}
.tbn.active{color:var(--td);border-bottom-color:var(--t)}
.sw{background:var(--w);padding:10px 14px;border-bottom:1px solid var(--br)}
.sw input{width:100%;padding:9px 15px;border:1.5px solid var(--br);border-radius:24px;font-size:15px;outline:none;background:var(--bg)}
.sw input:focus{border-color:var(--t);background:var(--w)}
.cl{flex:1;overflow-y:auto}
.sl2{padding:9px 16px 5px;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;background:var(--bg)}
.ci{background:var(--w);border-bottom:1px solid var(--br);padding:13px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.ci:active{background:#f0faf9}.ci.tc{border-left:4px solid var(--t)}
.cn{font-size:15px;font-weight:700;color:var(--td)}.cs{font-size:12px;color:var(--mu);margin-top:2px}.ct{font-size:11px;color:var(--t);font-weight:600;margin-top:2px}
.cc{background:var(--t);color:#fff;border-radius:14px;padding:3px 11px;font-size:12px;font-weight:700;white-space:nowrap;margin-left:10px}
.cc.today{background:var(--td)}
/* 출석화면 */
.wb{background:var(--td);color:#fff;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:sticky;top:56px;z-index:90}
.ws{font-size:12px;opacity:.9;flex:1}
.wa{display:flex;gap:7px}
.bsv{padding:6px 13px;background:var(--g);color:#3b2800;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.brs2{padding:6px 13px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.ib{background:var(--w);padding:9px 14px;border-bottom:1px solid var(--br);display:flex;gap:8px;align-items:center;position:sticky;top:112px;z-index:89}
.ib input{flex:1;padding:9px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:16px;outline:none;min-width:0}
.ib input:focus{border-color:var(--t)}
.si-box{background:#f0faf9;border:1.5px solid var(--t);border-radius:10px;padding:5px 12px;display:flex;flex-direction:column;align-items:center;min-width:72px;transition:opacity .3s}
.si-box.hide{opacity:0;pointer-events:none}
.si-nm{font-size:11px;color:var(--td);font-weight:700;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.si-se{font-size:22px;font-weight:900;color:var(--t);line-height:1.2}
/* 필터 */
.fb{background:var(--w);border-bottom:1px solid var(--br);padding:7px 12px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;position:sticky;top:162px;z-index:88}
.fc{padding:5px 13px;border:1.5px solid var(--br);border-radius:20px;font-size:12px;font-weight:600;background:var(--w);color:var(--mu);cursor:pointer;white-space:nowrap}
.fc.active{background:var(--td);color:#fff;border-color:var(--td)}
/* 서브필터 */
.sfb{background:#f9fafb;border-bottom:1px solid var(--br);padding:6px 12px;display:flex;gap:6px;overflow-x:auto;flex-shrink:0;position:sticky;top:206px;z-index:87}
.sfc{padding:4px 11px;border:1.5px solid var(--br);border-radius:20px;font-size:11px;font-weight:600;background:var(--w);color:var(--mu);cursor:pointer;white-space:nowrap}
.sfc.active{background:#475569;color:#fff;border-color:#475569}
.sfc.a-외박{background:#6366f1!important;border-color:#6366f1!important;color:#fff!important}
.sfc.a-취소{background:#9ca3af!important;border-color:#9ca3af!important;color:#fff!important}
.sfc.a-기타{background:#f59e0b!important;border-color:#f59e0b!important;color:#fff!important}
.sfc.a-미체크{background:var(--td)!important;border-color:var(--td)!important}
/* 학생카드 */
.stl{flex:1;overflow-y:auto;padding:10px 12px 24px}
.sc{background:var(--w);border-radius:14px;border:2px solid var(--br);padding:13px 15px;margin-bottom:9px;transition:border-color .2s,box-shadow .2s}
.sc.s1{border-color:var(--t);box-shadow:0 2px 8px rgba(43,173,160,.15)}
.sc.s2{border-color:#6366f1;box-shadow:0 2px 8px rgba(99,102,241,.15)}
.sc.s3{border-color:#9ca3af}
.sc.s4{border-color:#f59e0b;box-shadow:0 2px 8px rgba(245,158,11,.15)}
.sc.non-member{border-color:#dc2626;border-style:dashed}
.sc.pending-memo{border-color:#f59e0b;border-style:dashed}
.ct2{display:flex;align-items:baseline;gap:8px;margin-bottom:7px;flex-wrap:wrap}
.sn{font-size:16px;font-weight:800}.sid{font-size:12px;color:var(--mu)}.sse{font-size:13px;font-weight:700;color:var(--td);margin-left:auto}
.nm-badge{font-size:10px;font-weight:700;background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:10px;margin-left:4px}
.time-badge{font-size:10px;color:var(--mu);margin-left:2px}
.bgs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.bg{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.bb{background:#dcfce7;color:#166534}.bj{background:#f3e8ff;color:#6b21a8}
.bw{background:#fff7ed;color:#c2410c}.bq{background:#fce7f3;color:#9d174d}.bg2{background:#f1f5f9;color:#475569}
.stb{display:flex;gap:5px}
.stbtn{flex:1;padding:8px 3px;border:1.5px solid var(--br);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:var(--w);color:var(--mu)}
.sa{background:var(--t)!important;color:#fff!important;border-color:var(--t)!important}
.sb2{background:#6366f1!important;color:#fff!important;border-color:#6366f1!important}
.sc2{background:#9ca3af!important;color:#fff!important;border-color:#9ca3af!important}
.sd{background:#f59e0b!important;color:#fff!important;border-color:#f59e0b!important}
.memo-row{display:flex;gap:6px;margin-top:9px;padding-top:9px;border-top:1px dashed var(--br)}
.memo-row input{flex:1;padding:7px 11px;border:1.5px solid #f59e0b;border-radius:8px;font-size:13px;outline:none}
.memo-save{padding:7px 12px;background:#f59e0b;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.memo-saved{font-size:11px;color:var(--mu);margin-top:4px}
/* 시간표 */
.ttb{background:var(--w);padding:10px 14px;border-bottom:1px solid var(--br);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.bup{padding:7px 14px;background:var(--t);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.bar{padding:7px 14px;background:var(--w);color:var(--td);border:1.5px solid var(--t);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.bst{padding:7px 14px;background:var(--g);color:#3b2800;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
#fi2,#fi3{display:none}
.tt-sw{background:var(--w);padding:8px 14px;border-bottom:1px solid var(--br)}
.tt-sw input{width:100%;padding:8px 14px;border:1.5px solid var(--br);border-radius:20px;font-size:14px;outline:none;background:var(--bg)}
.tt-sw input:focus{border-color:var(--t);background:var(--w)}
.ttl{flex:1;overflow-y:auto;padding:10px}
.ttc{background:var(--w);border-radius:12px;border:1.5px solid var(--br);padding:13px;margin-bottom:9px}
.ttch{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ttdb{font-size:13px;font-weight:800;padding:3px 11px;border-radius:20px}
.dm{background:#dbeafe;color:#1e40af}.dt{background:#fce7f3;color:#9d174d}.dw{background:#dcfce7;color:#166534}
.dth{background:#fff7ed;color:#c2410c}.df{background:#f3e8ff;color:#6b21a8}.dsa{background:#fef9c3;color:#713f12}.dsu{background:#f1f5f9;color:#475569}
.bdl{background:none;border:none;color:#dc2626;font-size:18px;cursor:pointer;padding:2px 6px}
.ttf{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.ttfi{display:flex;flex-direction:column;gap:3px}
.ttfi label{font-size:11px;font-weight:700;color:var(--mu)}
.ttfi input,.ttfi select{padding:7px 10px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;outline:none;width:100%}
.ttfi input:focus,.ttfi select:focus{border-color:var(--t)}.ttfi.full{grid-column:1/-1}
/* 정기수업 */
.rsb{background:var(--w);padding:10px 14px;border-bottom:1px solid var(--br);display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.rsl{flex:1;overflow-y:auto;padding:10px}
.rsc{background:var(--w);border-radius:12px;border:1.5px solid var(--br);padding:14px;margin-bottom:10px}
.rsch{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rsn{font-size:15px;font-weight:800;color:var(--td)}.rsi{font-size:12px;color:var(--mu);margin-top:3px;line-height:1.6}
.rsact{display:flex;gap:6px}
.brsed{padding:5px 12px;background:var(--w);color:var(--td);border:1.5px solid var(--t);border-radius:7px;font-size:12px;font-weight:700;cursor:pointer}
.brsdl{padding:5px 10px;background:none;border:none;color:#dc2626;font-size:16px;cursor:pointer}
.rsi-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.ri-badge{font-size:11px;padding:3px 9px;border-radius:20px;background:#f0fdf4;color:#166534;font-weight:600}
/* 세션추가 */
.asf{background:var(--w);padding:12px 14px;border-bottom:1px solid var(--br)}
.asfields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.asfi{display:flex;flex-direction:column;gap:3px}
.asfi label{font-size:11px;font-weight:700;color:var(--mu)}
.asfi input,.asfi select{padding:8px 11px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;outline:none;width:100%}
.asfi input:focus,.asfi select:focus{border-color:var(--t)}.asfi.full{grid-column:1/-1}
.auto-info{background:#f0faf9;border:1px solid var(--t);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--td);margin-bottom:10px;display:none}
.as-sw{background:var(--w);padding:8px 14px;border-bottom:1px solid var(--br)}
.as-sw input{width:100%;padding:8px 14px;border:1.5px solid var(--br);border-radius:20px;font-size:14px;outline:none;background:var(--bg)}
.as-sw input:focus{border-color:var(--t);background:var(--w)}
.asl{flex:1;overflow-y:auto}
.asi{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--br);cursor:pointer;background:var(--w)}
.asi:hover{background:#f0faf9}
.ach{width:22px;height:22px;border-radius:6px;border:2px solid var(--br);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ach.on{background:var(--t);border-color:var(--t)}.ach.on::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.ain{flex:1}
.ain-name{font-size:14px;font-weight:700;color:var(--tx)}
.ain-sub{font-size:11px;color:var(--mu);margin-top:1px}
.ain-cnt{font-size:11px;color:var(--mu);white-space:nowrap;margin-left:6px}
/* 수동명단 */
.mh{background:var(--w);padding:12px 14px;border-bottom:1px solid var(--br)}
.mff{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.mf{display:flex;flex-direction:column;gap:3px}
.mf label{font-size:11px;font-weight:700;color:var(--mu)}
.mf input{padding:8px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;outline:none}
.mf input:focus{border-color:var(--t)}.mf.full{grid-column:1/-1}
.mur{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.bmu{padding:7px 14px;background:var(--t);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.bma{padding:7px 14px;background:var(--w);color:var(--td);border:1.5px solid var(--t);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.mir{padding:9px 14px;background:#f9fafb;border-bottom:1px solid var(--br);display:flex;gap:7px}
.mir input{flex:1;padding:8px 12px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;outline:none}
.mir input:focus{border-color:var(--t)}
.bmas{padding:8px 14px;background:var(--t);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;color:var(--mu)}
.sp{width:36px;height:36px;border:3px solid var(--br);border-top-color:var(--t);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--mu);font-size:14px;line-height:1.8}
.rb{margin-top:12px;padding:9px 20px;background:var(--t);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div id="sl" class="screen active">
  <div class="lb">
    <div class="ll"><div class="lt">강남대성기숙 QUETTA</div><div class="ls">출석 관리 시스템</div></div>
    <div class="fi"><label>비밀번호</label><input type="password" id="pwi" placeholder="비밀번호 입력" autocomplete="current-password"></div>
    <button class="blo" id="blo">로그인</button>
    <p class="le" id="le"></p>
  </div>
</div>

<div id="sh" class="screen">
  <div class="hd">
    <div class="ht"><div class="hs">강남대성기숙 QUETTA</div><h2>출석부</h2></div>
    <span id="hwk" style="font-size:11px;opacity:.8;white-space:nowrap"></span>
    <button class="bi" id="bref">↺</button>
    <button class="bi" id="bgarc">📊</button>
    <button class="bi" id="bgr">★</button>
    <button class="bi" id="bgt">📅</button>
    <button class="bi" id="bgm">📋</button>
    <button class="bi" id="blo2">⏻</button>
  </div>
  <div class="tb">
    <button class="tbn active" id="tab1">오늘 수업</button>
    <button class="tbn" id="tab2">전체 수업</button>
  </div>
  <div class="sw"><input type="search" id="srch" placeholder="수업명, 그룹, 조합 검색..."></div>
  <div class="cl" id="cl"><div class="loading"><div class="sp"></div><span>불러오는 중...</span></div></div>
</div>

<div id="sa" class="screen">
  <div class="hd">
    <button class="bi" id="bbk">←</button>
    <div class="ht"><div class="hs" id="asub"></div><h2 id="acn"></h2></div>
    <span id="awk" style="font-size:11px;opacity:.8;white-space:nowrap"></span>
  </div>
  <div class="wb">
    <span class="ws" id="ast">집계 중...</span>
    <div class="wa"><button class="bsv" id="bsw">주 마감</button><button class="brs2" id="brw">리셋</button></div>
  </div>
  <div class="ib">
    <input type="number" id="idi" placeholder="학번 입력 후 Enter" inputmode="numeric">
    <div class="si-box hide" id="sib">
      <div class="si-nm" id="sinm"></div>
      <div class="si-se" id="sise"></div>
    </div>
  </div>
  <div class="fb">
    <button class="fc active" id="fa">전체</button>
    <button class="fc" id="fu">미출석</button>
    <button class="fc" id="fc2">출석 완료</button>
  </div>
  <div class="sfb" id="sfb" style="display:none">
    <button class="sfc active" id="sf-all">미출석전체</button>
    <button class="sfc" id="sf-none">미체크</button>
    <button class="sfc" id="sf-외박">외박</button>
    <button class="sfc" id="sf-취소">취소</button>
    <button class="sfc" id="sf-기타">기타</button>
  </div>
  <div class="stl" id="stl"></div>
</div>

<div id="stt" class="screen">
  <div class="hd">
    <button class="bi" id="bttbk">←</button>
    <div class="ht"><div class="hs">강남대성기숙 QUETTA</div><h2>시간표 관리</h2></div>
  </div>
  <div class="ttb">
    <button class="bup" onclick="document.getElementById('fi2').click()">📂 엑셀 업로드</button>
    <input type="file" id="fi2" accept=".xlsx,.xls">
    <button class="bar" id="badd">+ 수업 추가</button>
    <button class="bst" id="bstt">💾 저장</button>
    <button style="padding:7px 14px;background:none;color:#dc2626;border:1.5px solid #dc2626;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer" id="bttclr">전체 삭제</button>
  </div>
  <div class="tt-sw"><input type="search" id="tt-srch" placeholder="그룹, 과목, 선생님, 강의실 검색..."></div>
  <div class="ttl" id="ttl"><div class="empty">시간표 없음</div></div>
</div>

<div id="sreg" class="screen">
  <div class="hd">
    <button class="bi" id="bregbk">←</button>
    <div class="ht"><div class="hs">오늘 탭에 표시할 수업</div><h2>정기수업 관리</h2></div>
  </div>
  <div class="rsb">
    <span style="font-size:13px;color:var(--mu);flex:1">수업을 묶어 세션으로 관리합니다</span>
    <button class="bst" id="baddses">+ 새 세션</button>
  </div>
  <div class="rsl" id="rsl"><div class="empty">세션이 없습니다.</div></div>
</div>

<div id="sas" class="screen">
  <div class="hd">
    <button class="bi" id="basbk">←</button>
    <div class="ht"><div class="hs">출석체크 단위 설정</div><h2 id="asttl">새 세션</h2></div>
    <button class="bi" id="bassv" style="font-size:14px;font-weight:700">저장</button>
  </div>
  <div class="asf">
    <div class="asfields">

function isRealJoham(s){if(!s||!s.trim())return false;return!/^\d+$/.test(s.trim())}
function buildCls(){
  const m={};
  for(const id in allStu){
    (allStu[id].수업목록||[]).forEach(u=>{
      if(!u.그룹명)return;
      const jo=isRealJoham(u.조합)?u.조합:'';
      const k=`${u.그룹명}|||${jo}|||${u.과목명||''}`;
      if(!m[k])m[k]={그룹명:u.그룹명,조합:jo,과목명:u.과목명||'',cnt:0};
      m[k].cnt++;
    });
  }
  allCls=Object.values(m).sort((a,b)=>a.그룹명.localeCompare(b.그룹명,'ko')||String(a.과목명||'').localeCompare(String(b.과목명||''),'ko'));
}

function getTodaySes(){return sessions.filter(s=>s.요일===today())}
function getSesStudentCount(ses){
  const keys=new Set((ses.items||[]).map(it=>`${it.그룹명}|||${it.조합||''}|||${it.과목명||''}`));
  let cnt=0;
  for(const id in allStu){
    if(!allStu[id].입소일||allStu[id].퇴소일)continue;
    if((allStu[id].수업목록||[]).some(u=>{
      const jo=isRealJoham(u.조합)?u.조합:'';
      return keys.has(`${u.그룹명}|||${jo}|||${u.과목명||''}`);
    }))cnt++;
  }
  return cnt;
}

// 수업명 표시 포맷: "과목명 · 그룹명 · 조합"
function clsLabel(c){return`${c.과목명||'(과목없음)'} · ${c.그룹명} · ${c.조합}`}
function normalize(s){return(s||'').replace(/\s+/g,'').toLowerCase()}
function clsSub(c){
  const cGrp=normalize(c.그룹명), cSub=normalize(c.과목명);
  // 1순위: 그룹+과목 둘 다 정확 매칭 (공백 무시)
  let tt2=tt.find(t=>normalize(t.그룹)===cGrp&&normalize(t.과목)===cSub);
  // 2순위: 그룹명 포함 관계 + 과목 매칭
  if(!tt2)tt2=tt.find(t=>(normalize(t.그룹).includes(cGrp)||cGrp.includes(normalize(t.그룹)))&&normalize(t.과목)===cSub);
  // 3순위: 그룹만 정확 매칭
  if(!tt2)tt2=tt.find(t=>normalize(t.그룹)===cGrp);
  // 4순위: 그룹 포함 관계
  if(!tt2)tt2=tt.find(t=>normalize(t.그룹).includes(cGrp)||cGrp.includes(normalize(t.그룹)));
  if(!tt2)return'';
  return[tt2.요일,tt2.시간,tt2.선생님].filter(Boolean).join(' · ');
}

function renderCls(q=''){
  const l=document.getElementById('cl');

  const td=today();
  const allSesSk=new Set(sessions.flatMap(s=>(s.items||[]).map(it=>`${it.그룹명}|||${it.조합}|||${it.과목명||''}`)));
  const todaySesSk=new Set(getTodaySes().flatMap(s=>(s.items||[]).map(it=>`${it.그룹명}|||${it.조합}|||${it.과목명||''}`)));

  if(tabM==='today'&&!q){
    const tds=getTodaySes();
    if(!tds.length){l.innerHTML=`<div class="empty">오늘(${td}) 정기수업 없음<br>★ 버튼에서 세션을 추가하세요.</div>`;return}
    window._tds=tds;
    l.innerHTML=`<div class="sl2">오늘 ${td}요일 ${tds.length}개 세션</div>`+
      tds.map((s,i)=>{
        const cnt=getSesStudentCount(s);
        return`<div class="ci tc" onclick="openSes(${i})">
          <div><div class="cn">${s.name}</div>
          <div class="cs">${[s.요일,s.시간,s.강의실,s.선생님].filter(Boolean).join(' · ')}</div>
          <div class="ct">${(s.items||[]).length}개 수업 포함</div></div>
          <span class="cc today">${cnt}명</span>
        </div>`;
      }).join('');
    return;
  }

  let filtered=q?allCls.filter(c=>{
    const label=clsLabel(c).toLowerCase();
    const sub=clsSub(c).toLowerCase();
    const ql=q.toLowerCase();
    return label.includes(ql)||c.그룹명.toLowerCase().includes(ql)||sub.includes(ql);
  }):allCls;
  if(!filtered.length){l.innerHTML='<div class="empty">검색 결과 없음</div>';return}

  let html='';
  if(!q){
    if(sessions.length){
      const dayOrder={월:0,화:1,수:2,목:3,금:4,토:5,일:6};
      const sortedSes=[...sessions].map((s,i)=>{
        const firstItem=(s.items||[])[0];
        const ttSub=firstItem?clsSub({그룹명:firstItem.그룹명,과목명:firstItem.과목명||''}):'';
        const ttDay=(ttSub.split(' · ')[0])||'';
        return{s,i,ttSub,ttDay};
      }).sort((a,b)=>(dayOrder[a.ttDay]??9)-(dayOrder[b.ttDay]??9));
      window._tds=sortedSes.map(x=>x.s);
      html+=`<div class="sl2">정기수업 세션 (${sessions.length})</div>`;
      html+=sortedSes.map(({s,i,ttSub,ttDay},si)=>{
        const cnt=getSesStudentCount(s);
        const isToday=ttDay===td;
        const infoStr=ttSub||[s.요일,s.시간,s.강의실,s.선생님].filter(Boolean).join(' · ');
        return`<div class="ci${isToday?' tc':''}" onclick="openSes(${si})">
          <div><div class="cn">${s.name}</div>
          <div class="cs">${infoStr}</div>
          <div class="ct">${(s.items||[]).length}개 수업 포함</div></div>
          <span class="cc${isToday?' today':''}">${cnt}명</span>
        </div>`;
      }).join('');
    }
    window._fc=filtered;
    html+=`<div class="sl2">전체 수업 (${filtered.length})</div>`;
    html+=filtered.map((c,i)=>ciHTML(c,i,false)).join('');
  }else{
    window._fc=filtered;
    html=filtered.map((c,i)=>ciHTML(c,i,false)).join('');
  }
  l.innerHTML=html;
}

function ciHTML(c,i,isT){
  const sub=clsSub(c);

    <div>
      <div class="cn">${clsLabel(c)}</div>
      ${sub?`<div class="cs">${sub}</div>`:''}
    </div>
    <span class="cc${isT?' today':''}">${c.cnt}명</span>
  </div>`;
}

function openCls(i){

function getSessionStudents(){
  const keys=new Set((curSes.items||[]).map(it=>`${it.그룹명}|||${it.조합||''}|||${it.과목명||''}`));
  const res=[];const addedIds=new Set();
  for(const id in allStu){
    const s=allStu[id];
    // 입소일 없으면 미입소 → 제외 / 퇴소일 있으면 퇴소 → 제외
    if(!s.입소일||s.퇴소일)continue;
    const match=(s.수업목록||[]).find(u=>{
      const jo=isRealJoham(u.조합)?u.조합:'';
      return keys.has(`${u.그룹명}|||${jo}|||${u.과목명||''}`);
    });
    if(match){res.push({...s,해당수업:match,nonMember:false});addedIds.add(id);}
  }
  for(const id in attData){
    if(!addedIds.has(id)&&attData[id].nonMember){
      const s=allStu[id]||{학번:id,성명:'(미확인)',반:'',성별:'',퀀텀자리:'',외박여부:''};
      res.push({...s,학번:id,해당수업:{좌석:'',조합:''},nonMember:true});
    }
  }
  return res;
}

  // 필터 적용
  if(fMode==='unchecked'){
    // 출석 제외 전체 (미체크 + 외박/취소/기타), 비수강생 제외
    stus=stus.filter(s=>!s.nonMember&&ad(s.학번).status!=='출석');
    if(subFilter==='none')stus=stus.filter(s=>!ad(s.학번).status);
    else if(subFilter==='외박')stus=stus.filter(s=>ad(s.학번).status==='외박');
    else if(subFilter==='취소')stus=stus.filter(s=>ad(s.학번).status==='취소');
    else if(subFilter==='기타')stus=stus.filter(s=>ad(s.학번).status==='기타');
    // 미체크 먼저
    stus.sort((a,b)=>{const wA=ad(a.학번).status?1:0,wB=ad(b.학번).status?1:0;if(wA!==wB)return wA-wB;return(a.성명||'').localeCompare(b.성명||'','ko')});
  }else if(fMode==='checked'){
    // 출석 + 비수강생 출석
    stus=stus.filter(s=>ad(s.학번).status==='출석');
    // 비수강생 맨 위 고정
    stus.sort((a,b)=>{if(a.nonMember&&!b.nonMember)return-1;if(!a.nonMember&&b.nonMember)return 1;return(a.성명||'').localeCompare(b.성명||'','ko')});
  }else{
    // 전체: 미체크 먼저, 그 다음 이름순
    stus.sort((a,b)=>{
      if(a.nonMember&&!b.nonMember)return-1;if(!a.nonMember&&b.nonMember)return 1;
      const wA=ad(a.학번).status?1:0,wB=ad(b.학번).status?1:0;if(wA!==wB)return wA-wB;
      return(a.성명||'').localeCompare(b.성명||'','ko');
    });
  }

  if(!stus.length){l.innerHTML=`<div class="empty">${fMode==='unchecked'?'미출석 없음 ✅':fMode==='checked'?'출석 없음':'학생 없음'}</div>`;return}

  l.innerHTML=stus.map(s=>{
    const aData=ad(s.학번);const st=aData.status||'';const memo=aData.memo||'';
    const{좌석,조합}=s.해당수업;
    const isPending=pendingMemoId===s.학번;
    const sc=isPending?'pending-memo':(s.nonMember?'non-member':({출석:'s1',외박:'s2',취소:'s3',기타:'s4'}[st]||''));
    const checkedAt=aData.checked_at?new Date(aData.checked_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'';

    return`<div class="sc ${sc}" id="card-${s.학번}">
      <div class="ct2">
        <span class="sn">${s.성명}</span>
        <span class="sid">${s.학번}</span>
        ${s.nonMember?`<span class="nm-badge">비수강생</span>`:''}
        ${좌석?`<span class="sse">좌석 ${좌석}</span>`:''}
        ${checkedAt?`<span class="time-badge">${checkedAt}</span>`:''}
      </div>
      <div class="bgs">
        ${s.반?`<span class="bg bb">${s.반}</span>`:''}
        ${s.성별?`<span class="bg bg2">${s.성별}</span>`:''}
        ${조합?`<span class="bg bj">${조합}</span>`:''}
        ${s.외박여부?`<span class="bg bw">외박 ${s.외박여부}</span>`:''}
        ${s.퀀텀자리?`<span class="bg bq">퀀텀 ${s.퀀텀자리}</span>`:''}
      </div>
      ${isPending?
        `<div style="font-size:12px;color:#f59e0b;font-weight:600;margin-bottom:6px">기타 사유를 입력하고 저장을 눌러주세요</div>
         <div class="memo-row">
           <input type="text" id="memo-pending-${s.학번}" placeholder="기타 사유 입력..." autofocus>
           <button class="memo-save" onclick="savePendingMemo('${s.학번}',document.getElementById('memo-pending-${s.학번}').value)">저장</button>
         </div>`:
        `<div class="stb">
           ${['출석','외박','취소','기타'].map((x,xi)=>{
             const cls=['sa','sb2','sc2','sd'][xi];
             return`<button class="stbtn${st===x?' '+cls:''}" onclick="setSt('${s.학번}','${x}')">${x}</button>`;
           }).join('')}
         </div>
         ${st==='기타'&&memo?`<div class="memo-saved">사유: ${memo} <button style="font-size:11px;border:none;background:none;color:var(--t);cursor:pointer;padding:0 4px" onclick="editMemo('${s.학번}')">수정</button></div>`:``}`
      }
    </div>`;
  }).join('');

  // pending 카드가 있으면 포커스
  if(pendingMemoId){
    setTimeout(()=>{const el=document.getElementById('memo-pending-'+pendingMemoId);if(el)el.focus()},50);
  }
}

function setSt(id,st){
  const path=`attendance/${wk}/${sk(curSes.id)}/${id}`;
  const cur=(attData[id]||{}).status;

  if(st==='기타'&&cur!=='기타'){
    // 메모 먼저 입력 (상태 저장 전)
    pendingMemoId=id;renderStu();return;
  }

  pendingMemoId=null;
  const now=Date.now();
  if(cur===st){db.ref(path).remove();}
  else{
    const existing=attData[id]||{};
    db.ref(path).set({status:st,nonMember:!!existing.nonMember,checked_at:existing.checked_at||now,updated_at:now});
  }
}

function savePendingMemo(id, memoVal){
  const memo = (memoVal !== undefined ? memoVal : (document.getElementById('memo-pending-'+id)||{}).value||'').trim();
  const now=Date.now();
  const existing=attData[id]||{};
  db.ref(`attendance/${wk}/${sk(curSes.id)}/${id}`).set({
    status:'기타',memo,nonMember:!!existing.nonMember,
    checked_at:existing.checked_at||now,updated_at:now
  });
  pendingMemoId=null;
}

function updateScheduleSection(){
  const autoInfo=document.getElementById('auto-info');
  const manSched=document.getElementById('manual-schedule');
  if(selItems.size===1){
    const[그룹명,조합,과목명]=[...selItems][0].split('|||');
    const cGrp=normalize(그룹명), cSub=normalize(과목명);
    // clsSub와 동일한 우선순위로 시간표 찾기
    let tt2=tt.find(t=>normalize(t.그룹)===cGrp&&normalize(t.과목)===cSub);
    if(!tt2)tt2=tt.find(t=>(normalize(t.그룹).includes(cGrp)||cGrp.includes(normalize(t.그룹)))&&normalize(t.과목)===cSub);
    if(!tt2)tt2=tt.find(t=>normalize(t.그룹)===cGrp);
    if(!tt2)tt2=tt.find(t=>normalize(t.그룹).includes(cGrp)||cGrp.includes(normalize(t.그룹)));
    if(!editSesId)document.getElementById('asname').value=`${과목명||그룹명} · ${그룹명} · ${조합}`;
    if(tt2){
      document.getElementById('asday').value=tt2.요일||'';
      document.getElementById('astime').value=tt2.시간||'';
      document.getElementById('asroom').value=tt2.강의실||'';
      document.getElementById('asteacher').value=tt2.선생님||'';
      autoInfo.textContent=`📅 시간표 자동 입력: ${[tt2.요일,tt2.시간,tt2.강의실,tt2.선생님].filter(Boolean).join(' · ')}`;
      autoInfo.style.display='block';manSched.style.display='none';
    }else{autoInfo.style.display='none';manSched.style.display='block'}
  }else{autoInfo.style.display='none';manSched.style.display='block'}
}

  if(manualStudents.find(s=>s.학번===id)){alert('이미 추가됨');return}
  const b=allStu[id]||{};
  manualStudents.push({학번:id,성명:b.성명||'(미확인)',성별:b.성별||'',퀀텀자리:b.퀀텀자리||'',외박여부:b.외박여부||'',좌석:se});
  document.getElementById('miid').value='';document.getElementById('mise').value='';renderMan();
}
document.getElementById('fi3').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      let add=0;
      rows.forEach(r=>{
        const id=String(r['학번']||'').trim(),se=String(r['좌석번호']||r['좌석']||'').trim();
        if(!id||manualStudents.find(s=>s.학번===id))return;
        const b=allStu[id]||{};
        manualStudents.push({학번:id,성명:b.성명||'(미확인)',성별:b.성별||'',퀀텀자리:b.퀀텀자리||'',외박여부:b.외박여부||'',좌석:se});
        add++;
      });
      alert(`${add}명 추가`);renderMan();
    }catch(e){alert('파일 오류: '+e.message)}
    e.target.value='';
  };r.readAsBinaryString(f);
});
document.getElementById('mfa').addEventListener('click',()=>setMF('all'));
document.getElementById('mfu').addEventListener('click',()=>setMF('unchecked'));
document.getElementById('mfc').addEventListener('click',()=>setMF('checked'));
function setMF(m){manualFilter=m;document.querySelectorAll('#sma .fc').forEach(b=>b.classList.remove('active'));document.getElementById(m==='all'?'mfa':m==='unchecked'?'mfu':'mfc').classList.add('active');renderMan()}
function renderMan(){
  const l=document.getElementById('msl');
  let sts=[...manualStudents];
  const mad=id=>(manualAttendance[id]||{});
  if(manualFilter==='unchecked'){sts=sts.filter(s=>mad(s.학번).status!=='출석');sts.sort((a,b)=>(mad(a.학번).status?1:0)-(mad(b.학번).status?1:0))}
  else if(manualFilter==='checked')sts=sts.filter(s=>mad(s.학번).status==='출석');
  if(!sts.length){l.innerHTML=`<div class="empty">${manualFilter==='unchecked'?'미출석 없음 ✅':'학번을 추가해주세요.'}</div>`;return}
  l.innerHTML=sts.map(s=>{
    const aData=mad(s.학번);const st=aData.status||'';const memo=aData.memo||'';
    const sc={출석:'s1',외박:'s2',취소:'s3',기타:'s4'}[st]||'';
    const checkedAt=aData.checked_at?new Date(aData.checked_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'';
    return`<div class="sc ${sc}">
      <div class="ct2"><span class="sn">${s.성명}</span><span class="sid">${s.학번}</span>${s.좌석?`<span class="sse">좌석 ${s.좌석}</span>`:''}${checkedAt?`<span class="time-badge">${checkedAt}</span>`:''}</div>
      <div class="bgs">
        ${s.성별?`<span class="bg bg2">${s.성별}</span>`:''}
        ${s.외박여부?`<span class="bg bw">외박 ${s.외박여부}</span>`:''}
        ${s.퀀텀자리?`<span class="bg bq">퀀텀 ${s.퀀텀자리}</span>`:''}
      </div>
      <div class="stb">${['출석','외박','취소','기타'].map((x,xi)=>`<button class="stbtn${st===x?' '+'sa sb2 sc2 sd'.split(' ')[xi]:''}" onclick="setMSt('${s.학번}','${x}')">${x}</button>`).join('')}</div>
      ${st==='기타'&&memo?`<div class="memo-saved">사유: ${memo}</div>`:``}
    </div>`;
  }).join('');
}
function setMSt(id,st){
  const cur=(manualAttendance[id]||{}).status;
  const now=Date.now();
  if(cur===st){delete manualAttendance[id];}
  else{manualAttendance[id]={status:st,checked_at:(manualAttendance[id]||{}).checked_at||now,updated_at:now};}
  renderMan();
}

// ═══════════════════════════════
// 출석 기록 조회
// ═══════════════════════════════
let arcData={},selArcWeek=null,selArcSesId=null;

document.getElementById('bgarc').addEventListener('click',()=>{ss('sarc');loadArc()});
document.getElementById('barcbk').addEventListener('click',()=>{
  if(selArcSesId){selArcSesId=null;renderArcSessions();}
  else if(selArcWeek){selArcWeek=null;renderArcWeeks();}
  else ss('sh');
});
document.getElementById('barc-exp').addEventListener('click',exportArc);

async function loadArc(){
  const c=document.getElementById('arc-content');
  c.innerHTML='<div class="loading"><div class="sp"></div><span>불러오는 중...</span></div>';
  try{
    const snap=await db.ref('weekly_archive').get();
    arcData=snap.exists()?snap.val():{};
    selArcWeek=null;selArcSesId=null;
    renderArcWeeks();
  }catch(e){c.innerHTML=`<div class="empty">로드 실패<br>${e.message}</div>`}
}

function renderArcWeeks(){
  document.getElementById('arc-sub').textContent='주차 선택';
  document.getElementById('arc-title').textContent='출석 기록';
  document.getElementById('barc-exp').style.display='none';
  const c=document.getElementById('arc-content');
  const weeks=Object.keys(arcData).sort().reverse();
  if(!weeks.length){c.innerHTML='<div class="empty">저장된 기록이 없습니다.<br>출석 화면 주 마감 버튼으로 저장해주세요.</div>';return}
  c.innerHTML=weeks.map(w=>{
    const saved=arcData[w].saved_at;
    const savedStr=saved?new Date(saved).toLocaleDateString('ko-KR'):'';
    const sesCnt=Object.keys(arcData[w].data||{}).length;
    return`<div class="ci" onclick="selArcW('${w}')">
      <div><div class="cn">${wkLbl(w)}</div><div class="cs">${savedStr} · ${sesCnt}개 세션</div></div>
      <span style="font-size:20px;color:var(--mu)">›</span>
    </div>`;
  }).join('');
}

function selArcW(w){selArcWeek=w;renderArcSessions()}

function renderArcSessions(){
  document.getElementById('arc-sub').textContent=wkLbl(selArcWeek);
  document.getElementById('arc-title').textContent='세션 선택';
  document.getElementById('barc-exp').style.display='none';
  const sesData=(arcData[selArcWeek]||{}).data||{};
  const c=document.getElementById('arc-content');
  const ids=Object.keys(sesData);
  if(!ids.length){c.innerHTML='<div class="empty">세션 데이터가 없습니다.</div>';return}
  c.innerHTML=ids.map(sid=>{
    const sesInfo=sessions.find(s=>s.id===sid);
    const name=sesInfo?sesInfo.name:sid;
    const att=sesData[sid]||{};
    const total=Object.keys(att).length;
    const checked=Object.values(att).filter(v=>v.status==='출석').length;
    return`<div class="ci" onclick="selArcS('${sid}')">
      <div><div class="cn">${name}</div><div class="cs">출석 ${checked} · 전체 체크 ${total}명</div></div>
      <span style="font-size:20px;color:var(--mu)">›</span>
    </div>`;
  }).join('');
}

function selArcS(sid){selArcSesId=sid;renderArcDetail()}

function getArcStudents(sesInfo){
  if(!sesInfo)return[];
  const keys=new Set((sesInfo.items||[]).map(it=>`${it.그룹명}|||${it.조합||''}|||${it.과목명||''}`));
  const res=[];
  for(const id in allStu){
    const s=allStu[id];
    if(!s.입소일||s.퇴소일)continue;
    const match=(s.수업목록||[]).find(u=>{const jo=isRealJoham(u.조합)?u.조합:'';return keys.has(`${u.그룹명}|||${jo}|||${u.과목명||''}`)});
    if(match)res.push({...s,해당수업:match,nonMember:false});
  }
  return res.sort((a,b)=>(a.성명||'').localeCompare(b.성명||'','ko'));
}

function renderArcDetail(){
  const sesInfo=sessions.find(s=>s.id===selArcSesId);
  const name=sesInfo?sesInfo.name:selArcSesId;
  document.getElementById('arc-sub').textContent=wkLbl(selArcWeek);
  document.getElementById('arc-title').textContent=name;
  document.getElementById('barc-exp').style.display='block';
  const att=(arcData[selArcWeek]?.data||{})[selArcSesId]||{};
  const c=document.getElementById('arc-content');
  let stus=getArcStudents(sesInfo);

  // 비수강생 추가
  const memberIds=new Set(stus.map(s=>s.학번));
  for(const id in att){
    if(!memberIds.has(id)&&att[id].nonMember){
      const s=allStu[id]||{학번:id,성명:'(미확인)',반:'',성별:'',퀀텀자리:'',외박여부:''};
      stus.unshift({...s,학번:id,해당수업:{좌석:'',조합:''},nonMember:true});
    }
  }

  const cnt={출석:0,외박:0,취소:0,기타:0,미체크:0};
  stus.forEach(s=>{const st=(att[s.학번]||{}).status;st?cnt[st]++:cnt['미체크']++});

  c.innerHTML=`
    <div style="background:var(--td);color:#fff;padding:9px 14px;font-size:12px;flex-shrink:0">
      전체 ${stus.length} | 출석 ${cnt.출석}  외박 ${cnt.외박}  취소 ${cnt.취소}  기타 ${cnt.기타}  미체크 ${cnt.미체크}
    </div>
    <div style="flex:1;overflow-y:auto;padding:10px 12px 24px">
    ${stus.map(s=>{
      const aData=att[s.학번]||{};const st=aData.status||'';const memo=aData.memo||'';
      const{좌석,조합}=s.해당수업;
      const sc=s.nonMember?'non-member':({출석:'s1',외박:'s2',취소:'s3',기타:'s4'}[st]||'');
      const checkedAt=aData.checked_at?new Date(aData.checked_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'';
      const stColors={출석:'#dcfce7|#166534',외박:'#e0e7ff|#3730a3',취소:'#f1f5f9|#475569',기타:'#fef9c3|#713f12'};
      const[bg,fg]=(stColors[st]||'#fee2e2|#dc2626').split('|');
      return`<div class="sc ${sc}" style="margin-bottom:9px">
        <div class="ct2">
          <span class="sn">${s.성명}</span><span class="sid">${s.학번}</span>
          ${s.nonMember?'<span class="nm-badge">비수강생</span>':''}
          ${좌석?`<span class="sse">좌석 ${좌석}</span>`:''}
          ${checkedAt?`<span class="time-badge">${checkedAt}</span>`:''}
        </div>
        <div class="bgs">
          ${s.반?`<span class="bg bb">${s.반}</span>`:''}
          ${s.성별?`<span class="bg bg2">${s.성별}</span>`:''}
          ${조합?`<span class="bg bj">${조합}</span>`:''}
          <span class="bg" style="background:${bg};color:${fg}">${st||'미체크'}</span>
          ${memo?`<span class="bg bw">사유: ${memo}</span>`:''}
        </div>
      </div>`;
    }).join('')}
    </div>`;
}

function exportArc(){
  if(!selArcWeek||!selArcSesId)return;
  const sesInfo=sessions.find(s=>s.id===selArcSesId);
  const name=sesInfo?sesInfo.name:selArcSesId;
  const att=(arcData[selArcWeek]?.data||{})[selArcSesId]||{};
  const stus=getArcStudents(sesInfo);
  const rows=stus.map(s=>{
    const aData=att[s.학번]||{};
    return{
      학번:s.학번, 성명:s.성명, 반:s.반, 성별:s.성별,
      좌석:s.해당수업.좌석||'',
      상태:aData.status||'미체크',
      시간:aData.checked_at?new Date(aData.checked_at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'',
      사유:aData.memo||''
    };
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31));
  XLSX.writeFile(wb,`${wkLbl(selArcWeek)}_${name}.xlsx`);
}
</script>
